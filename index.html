<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Gate — Drop-off / Collection Manifest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181D;
    --panel:#1B2129;
    --panel-raised:#20272F;
    --border:#2B333C;
    --text:#EDEDEC;
    --muted:#8A94A3;
    --amber:#F2A93B;
    --green:#49B47D;
    --red:#E5484D;
    --hazard-dark:#1B2129;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .hazard-bar{
    height:10px;
    background-image:repeating-linear-gradient(135deg, var(--amber) 0 18px, var(--hazard-dark) 18px 36px);
  }
  header{
    padding:28px 20px 20px;
    border-bottom:1px solid var(--border);
    background:var(--panel);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:clamp(28px,7vw,40px);
    letter-spacing:0.01em;
    text-transform:uppercase;
    margin:0;
    line-height:1.05;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    margin-top:8px;
    max-width:520px;
  }
  main{
    max-width:560px;
    margin:0 auto;
    padding:24px 20px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:4px;
    padding:20px;
    margin-bottom:20px;
  }
  .panel-title{
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel-title::before{
    content:'';
    width:6px;height:6px;
    background:var(--amber);
    display:inline-block;
  }

  /* Boom gate */
  .gate-wrap{
    display:flex;
    align-items:center;
    gap:20px;
    padding:16px 4px 4px;
  }
  .gate-svg{flex-shrink:0;}
  .gate-arm{
    transform-origin: 14px 92px;
    transition: transform 0.9s cubic-bezier(.4,1.4,.4,1);
  }
  .gate-status-text{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    line-height:1.5;
  }
  .gate-status-text .label{
    display:block;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:3px;
  }
  .status-checking{color:var(--amber);}
  .status-pass{color:var(--green);}
  .status-fail{color:var(--red);}
  .coords{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--border);
  }

  input[type=text], input[type=tel], input[type=datetime-local], select, textarea{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:11px 12px;
    border-radius:3px;
  }
  input:focus, select:focus, textarea:focus{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }

  /* Form */
  .field{margin-bottom:16px;}
  .field-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--amber);
    margin-right:6px;
  }
  label{
    display:block;
    font-size:13px;
    font-weight:500;
    margin-bottom:6px;
    color:var(--text);
  }
  .radio-row{display:flex;gap:10px;}
  .radio-opt{
    flex:1;
    border:1px solid var(--border);
    border-radius:3px;
    padding:12px;
    text-align:center;
    cursor:pointer;
    font-family:'Oswald',sans-serif;
    letter-spacing:0.06em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--muted);
    transition:all .15s;
  }
  .radio-opt.active{
    border-color:var(--amber);
    color:var(--amber);
    background:rgba(242,169,59,0.08);
  }
  .radio-opt input{display:none;}
  textarea{resize:vertical;min-height:70px;font-family:'Inter',sans-serif;}

  .submit-btn{
    width:100%;
    padding:15px;
    background:var(--amber);
    color:#14181D;
    border:none;
    border-radius:3px;
    font-family:'Oswald',sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    margin-top:6px;
  }
  .submit-btn:disabled{
    background:var(--panel-raised);
    color:var(--muted);
    cursor:not-allowed;
  }
  .submit-btn:not(:disabled):hover{filter:brightness(1.08);}

  .msg{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:10px 12px;
    border-radius:3px;
    margin-top:12px;
    display:none;
  }
  .msg.show{display:block;}
  .msg.ok{background:rgba(73,180,125,0.1);color:var(--green);border:1px solid rgba(73,180,125,0.3);}
  .msg.err{background:rgba(229,72,77,0.1);color:var(--red);border:1px solid rgba(229,72,77,0.3);}

  .log-entry{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    padding:8px 0;
    border-bottom:1px dashed var(--border);
  }
  .log-entry:last-child{border-bottom:none;}
  .log-entry b{color:var(--text);}
  .empty{color:var(--muted);font-size:13px;font-style:italic;}
</style>
</head>
<body>

<div class="hazard-bar"></div>
<header>
  <p class="eyebrow">Site Access · Checkpoint 01</p>
  <h1>Drop-off &amp; Collection Manifest</h1>
  <p class="sub">Scan at the gate to log a delivery or collection. The form only accepts submissions from within the site boundary.</p>
</header>

<main>

  <!-- Geofence status panel -->
  <div class="panel">
    <p class="panel-title">Gate status</p>
    <div class="gate-wrap">
      <svg class="gate-svg" width="90" height="100" viewBox="0 0 90 100">
        <rect x="6" y="86" width="16" height="10" fill="#2B333C"/>
        <rect x="8" y="20" width="12" height="70" fill="#2B333C"/>
        <g class="gate-arm" id="gateArm">
          <rect x="14" y="88" width="70" height="8" rx="2" fill="var(--amber)" stroke="#14181D" stroke-width="1"/>
          <rect x="24" y="88" width="8" height="8" fill="#14181D"/>
          <rect x="44" y="88" width="8" height="8" fill="#14181D"/>
          <rect x="64" y="88" width="8" height="8" fill="#14181D"/>
        </g>
      </svg>
      <div class="gate-status-text">
        <span class="label">Location check</span>
        <span id="statusLine" class="status-checking">Requesting location…</span>
        <div class="coords" id="coordsLine">Target: 51.35584°N, 0.30983°W</div>
      </div>
    </div>
  </div>

  <!-- Form panel -->
  <div class="panel">
    <p class="panel-title">Manifest entry</p>
    <form id="logForm">

      <div class="field">
        <label><span class="field-num">01</span>Type of visit</label>
        <div class="radio-row">
          <label class="radio-opt" id="optDrop"><input type="radio" name="type" value="Drop-off" checked>Drop-off</label>
          <label class="radio-opt" id="optCollect"><input type="radio" name="type" value="Collection">Collection</label>
        </div>
      </div>

      <div class="field">
        <label><span class="field-num">02</span>Driver name</label>
        <input type="text" id="driverName" required placeholder="Full name">
      </div>

      <div class="field">
        <label><span class="field-num">03</span>Carrier / company</label>
        <input type="text" id="company" required placeholder="e.g. Fastline Logistics">
      </div>

      <div class="field">
        <label><span class="field-num">04</span>Customer</label>
        <input type="text" id="customer" placeholder="e.g. Acme Retail Ltd">
      </div>

      <div class="field">
        <label><span class="field-num">05</span>Date &amp; time</label>
        <input type="datetime-local" id="datetime">
      </div>

      <div class="field">
        <label><span class="field-num">06</span>Number of items / pallets</label>
        <input type="text" id="qty" placeholder="e.g. 3 pallets">
      </div>

      <div class="field">
        <label><span class="field-num">07</span>Notes</label>
        <textarea id="notes" placeholder="Anything the site team should know"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>Confirm at gate</button>
      <div class="msg" id="formMsg"></div>
    </form>
  </div>


</main>

<script>
  // ---- Geofence config ----
  const TARGET_LAT = 51.35584;
  const TARGET_LNG = -0.30983;
  const RADIUS_METERS = 150;
  let withinFence = false;

  function haversine(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const toRad = d => d * Math.PI/180;
    const dLat = toRad(lat2-lat1);
    const dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  const statusLine = document.getElementById('statusLine');
  const coordsLine = document.getElementById('coordsLine');
  const gateArm = document.getElementById('gateArm');
  const submitBtn = document.getElementById('submitBtn');

  function setGate(open){
    gateArm.style.transform = open ? 'rotate(-72deg)' : 'rotate(0deg)';
  }

  function checkLocation(){
    if(!navigator.geolocation){
      statusLine.textContent = 'Geolocation unsupported on this device';
      statusLine.className = 'status-fail';
      setGate(false);
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      const {latitude, longitude, accuracy} = pos.coords;
      const dist = haversine(latitude, longitude, TARGET_LAT, TARGET_LNG);
      withinFence = dist <= RADIUS_METERS;
      coordsLine.textContent = `Target: ${TARGET_LAT}°N, ${Math.abs(TARGET_LNG)}°W · You: ${dist.toFixed(0)}m away (±${accuracy.toFixed(0)}m)`;
      if(withinFence){
        statusLine.textContent = `Within site boundary — ${dist.toFixed(0)}m from gate`;
        statusLine.className = 'status-pass';
        setGate(true);
        submitBtn.disabled = false;
      } else {
        statusLine.textContent = `Outside site boundary — ${dist.toFixed(0)}m from gate (max ${RADIUS_METERS}m)`;
        statusLine.className = 'status-fail';
        setGate(false);
        submitBtn.disabled = true;
      }
    }, err => {
      statusLine.textContent = 'Location permission denied or unavailable';
      statusLine.className = 'status-fail';
      setGate(false);
      submitBtn.disabled = true;
    }, {enableHighAccuracy:true, timeout:10000});
  }
  checkLocation();
  setInterval(checkLocation, 20000);

  // ---- Radio toggle styling ----
  const optDrop = document.getElementById('optDrop');
  const optCollect = document.getElementById('optCollect');
  function syncRadios(){
    optDrop.classList.toggle('active', optDrop.querySelector('input').checked);
    optCollect.classList.toggle('active', optCollect.querySelector('input').checked);
  }
  optDrop.addEventListener('click', syncRadios);
  optCollect.addEventListener('click', syncRadios);
  syncRadios();

  // ---- Form submit ----
  const form = document.getElementById('logForm');
  const formMsg = document.getElementById('formMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!withinFence){
      formMsg.textContent = 'You must be within the site boundary to submit.';
      formMsg.className = 'msg show err';
      return;
    }
    const entry = {
      type: form.querySelector('input[name=type]:checked').value,
      driverName: document.getElementById('driverName').value.trim(),
      company: document.getElementById('company').value.trim(),
      customer: document.getElementById('customer').value.trim(),
      datetime: document.getElementById('datetime').value,
      qty: document.getElementById('qty').value.trim(),
      notes: document.getElementById('notes').value.trim(),
      ts: Date.now()
    };
    if(!entry.driverName || !entry.company){
      formMsg.textContent = 'Please fill in driver name and company.';
      formMsg.className = 'msg show err';
      return;
    }
    try{
      const response = await fetch('https://formspree.io/f/mdarvqkv', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          'Type of visit': entry.type,
          'Driver name': entry.driverName,
          'Carrier / company': entry.company,
          'Customer': entry.customer,
          'Date & time': entry.datetime,
          'Number of items / pallets': entry.qty,
          'Notes': entry.notes,
          'Submitted at': new Date(entry.ts).toLocaleString()
        })
      });
      if(response.ok){
        formMsg.textContent = `Logged: ${entry.type.toLowerCase()} for ${entry.company} at ${new Date(entry.ts).toLocaleTimeString()}.`;
        formMsg.className = 'msg show ok';
        form.reset();
        syncRadios();
      } else {
        formMsg.textContent = 'Could not save entry — please try again.';
        formMsg.className = 'msg show err';
      }
    }catch(err){
      formMsg.textContent = 'Could not save entry — please try again.';
      formMsg.className = 'msg show err';
    }
  });
</script>

</body>
</html>
